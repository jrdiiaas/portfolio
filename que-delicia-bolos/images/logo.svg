<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.08" />
    </filter>
  </defs>
  
  <!-- Outer White Sticker Outline Background -->
  <path d="M 65,45 
           C 65,25 90,15 130,15 
           C 170,15 210,25 225,45 
           C 240,40 280,45 310,65 
           C 340,85 365,115 365,145 
           C 365,175 350,205 320,225 
           C 290,245 220,250 140,245 
           C 60,240 30,220 30,195 
           C 30,170 45,150 45,135 
           C 45,120 40,95 48,75 
           C 55,55 65,45 65,45 Z" 
        fill="#ffffff" 
        stroke="#ffffff" 
        stroke-width="16" 
        stroke-linejoin="round" 
        stroke-linecap="round"
        filter="url(#shadow)" />

  <!-- Smooth White Outer Cloud Shape -->
  <g fill="#ffffff">
    <circle cx="120" cy="65" r="45" />
    <circle cx="190" cy="60" r="42" />
    <circle cx="260" cy="85" r="48" />
    <circle cx="315" cy="130" r="45" />
    <circle cx="300" cy="180" r="45" />
    <circle cx="210" cy="205" r="40" />
    <circle cx="120" cy="205" r="42" />
    <circle cx="65" cy="165" r="42" />
    <circle cx="65" cy="105" r="40" />
    <rect x="70" y="55" width="230" height="150" rx="20" />
  </g>

  <!-- Logo Red Typography (#d4223b) -->
  <g fill="#d4223b" stroke="#d4223b">
    
    <!-- "Que" -->
    <text x="75" y="115" font-family="'Playfair Display', Georgia, serif" font-weight="900" font-size="78" font-style="italic" letter-spacing="-2" stroke="none">Que</text>
    
    <!-- "Delícia!" -->
    <text x="70" y="185" font-family="'Playfair Display', Georgia, serif" font-weight="900" font-size="76" letter-spacing="-1.5" stroke="none">Delícia!</text>
    
    <!-- Subtitle: Wavy Line + "bolos caseiros" -->
    <!-- Wavy Underline under Que -->
    <path d="M 72,208 Q 85,202 98,208 T 124,208 T 150,208" fill="none" stroke="#d4223b" stroke-width="4.5" stroke-linecap="round" />
    
    <!-- "bolos caseiros" text -->
    <text x="162" y="212" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-weight="800" font-size="30" letter-spacing="0.5" stroke="none">bolos caseiros</text>
  </g>
</svg>
